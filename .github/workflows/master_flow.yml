name: master-etl
on:
  push:
    branches:
      - main
    paths:
      - "local/**/*.xlsx"

  schedule:
    - cron: "0 5 * * *"  # every  days

jobs:
  run-etl:
    runs-on: ubuntu-latest
    environment: Env
    env:
      PYTHONPATH: ${{ github.workspace }}
      API_KEY: ${{ secrets.API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
  
      - name: cache pip 
        uses: actions/cache@v4
        with: 
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt



      - name: Run Master_ETL workflow
        run: python -m app.main
        
      - name: Slack Notification Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "master etl Success: system Sync run "
          SLACK_COLOR: "good"
          SLACK_MESSAGE: "The master workflow finished successfully! ✅\nView Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Slack Notification Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "master elt Failure: Database Sync"
          SLACK_COLOR: "danger"
          SLACK_MESSAGE: "The master workflow failed. ❌ Please check the logs to fix the error.\nView Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"  

  

